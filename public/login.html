<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - Rental APP</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1c6dd0">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rental APP">
<script src="/js/pwa.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="auth-bg">
<main class="narrow" style="max-width:420px;margin:0 auto;padding:0 16px">
  <div class="card">
    <div class="auth-logo">
      <svg class="badge-icon" width="44" height="44" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#2563eb"/>
            <stop offset="1" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <rect width="44" height="44" rx="12" fill="url(#logoGrad)"/>
        <g fill="none" stroke="#fff" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
          <path d="M22 9 L34 15 L34 29 L22 35 L10 29 L10 15 Z"/>
          <path d="M10 15 L22 21 L34 15"/>
          <path d="M22 21 L22 35"/>
        </g>
        <path d="M6 6 L6 11 M6 6 L11 6" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
        <path d="M38 6 L38 11 M38 6 L33 6" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
      </svg>
      <div class="word">Rental<span class="accent">APP</span></div>
    </div>
    <h1 class="center" style="margin-top:-6px">Đăng nhập</h1>
    <form id="form">
      <div style="margin-bottom:12px">
        <label>Tên đăng nhập</label>
        <input name="username" required autocomplete="username" autofocus>
      </div>
      <div style="margin-bottom:12px">
        <label>Mật khẩu</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" style="width:100%">Đăng nhập</button>
    </form>
    <p class="center muted" style="font-size:12.5px;margin-top:14px">Tài khoản do quản trị công ty của bạn cấp.</p>
    <p class="center muted" style="margin-top:10px">Chưa có tài khoản? <a href="/signup.html">Đăng ký công ty mới</a></p>
  </div>
</main>

<script src="/js/config.js"></script>
<script src="/js/supabaseClient.js"></script>
<script src="/js/common.js"></script>
<script>
function landingPageFor(profile) {
  if (profile && profile.role === 'superadmin') return '/admin/index.html';
  return isAdmin(profile) ? '/index.html' : '/xuat-kho.html';
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const { username, password } = Object.fromEntries(fd.entries());
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  try {
    const { error } = await sb.auth.signInWithPassword({ email: usernameToEmail(username), password });
    if (error) throw error;
    const profile = await getSessionProfile();
    location.href = landingPageFor(profile);
  } catch (err) {
    toast('Sai tên đăng nhập hoặc mật khẩu', 'error');
    btn.disabled = false;
  }
});

sb.auth.getSession().then(async ({ data }) => {
  if (!data.session) return;
  const profile = await getSessionProfile();
  location.href = landingPageFor(profile);
});
</script>
</body>
</html>
