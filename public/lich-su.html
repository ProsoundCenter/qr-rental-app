<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử show - QR Rental Manager</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>
<div id="nav-container"></div>
<main>
  <div class="flex between">
    <h1>Lịch sử xuất kho theo show</h1>
    <a href="/xuat-kho.html" class="btn">+ Xuất kho / Quét QR</a>
  </div>

  <div class="card" id="listCard">
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Mã show</th><th>Tên show</th><th>Khách hàng</th><th>Địa điểm</th><th>Thời gian</th>
          <th class="center">Số thiết bị</th><th class="right" id="depHeader">Tổng khấu hao</th><th>Trạng thái</th><th></th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="empty" class="empty-state" style="display:none">Chưa có show nào.</div>
  </div>

  <div class="card" id="detailCard" style="display:none">
    <div class="flex between">
      <h2 id="detailTitle"></h2>
      <div class="flex">
        <a id="exportLink" href="#" class="btn secondary">📊 Xuất Excel (biên bản)</a>
        <button class="secondary" id="closeDetail">Đóng</button>
      </div>
    </div>
    <p class="muted" id="detailMeta"></p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Mã QR</th><th>Nhóm</th><th>Model</th><th>Kiểu KH</th><th class="right" id="detailDepHeader">Khấu hao trừ</th><th>Xuất lúc</th><th>Trả lúc</th></tr></thead>
        <tbody id="detailBody"></tbody>
      </table>
    </div>
    <div class="right" style="margin-top:8px" id="detailTotalWrap"><strong>Tổng: </strong><span id="detailTotal"></span></div>
  </div>
</main>

<script src="/js/config.js"></script>
<script src="/js/supabaseClient.js"></script>
<script src="/js/common.js"></script>
<script src="/js/data.js"></script>
<script>
let profile = null;

async function load() {
  const rentals = await listRentals();
  document.getElementById('empty').style.display = rentals.length ? 'none' : 'block';
  document.getElementById('depHeader').style.display = isAdmin(profile) ? '' : 'none';
  document.getElementById('tbody').innerHTML = rentals.map(r => `
    <tr>
      <td class="mono">${esc(r.code)}</td>
      <td>${esc(r.show_name)}</td>
      <td>${esc(r.customer || '—')}</td>
      <td>${esc(r.location || '—')}</td>
      <td style="font-size:12.5px">${fmtDate(r.start_datetime)}<br>→ ${fmtDate(r.end_datetime)}</td>
      <td class="center">—</td>
      ${isAdmin(profile) ? `<td class="right">${money(r.total_depreciation_value)}</td>` : ''}
      <td><span class="badge ${r.status}">${statusLabel(r.status)}</span></td>
      <td><button class="secondary" data-view="${r.id}">Xem</button></td>
    </tr>
  `).join('');
  document.querySelectorAll('button[data-view]').forEach(btn => {
    btn.addEventListener('click', () => viewDetail(btn.dataset.view));
  });
}

function statusLabel(s) {
  return { active: 'Đang mở', closed: 'Đã đóng', returned: 'Đã trả kho' }[s] || s;
}

async function viewDetail(id) {
  const r = await getRental(id);
  const items = await getRentalItems(id);
  document.getElementById('detailCard').style.display = '';
  document.getElementById('detailTitle').textContent = r.code + ' — ' + r.show_name;
  document.getElementById('detailMeta').textContent =
    `${r.customer || '—'} · ${r.location || '—'} · ${fmtDate(r.start_datetime)} → ${fmtDate(r.end_datetime)} · Trạng thái: ${statusLabel(r.status)}`;
  document.getElementById('detailDepHeader').style.display = isAdmin(profile) ? '' : 'none';
  document.getElementById('detailBody').innerHTML = items.map(i => {
    const a = i.assets || {};
    return `
    <tr>
      <td class="mono">${esc(a.qr_code)}</td>
      <td>${esc(a.asset_group)} / ${esc(a.category)}</td>
      <td>${esc(a.brand)} ${esc(a.model)}</td>
      <td>${a.depreciation_type === 'show' ? 'Theo show' : 'Theo tháng'}</td>
      ${isAdmin(profile) ? `<td class="right">${money(i.deduction_value)}</td>` : ''}
      <td>${fmtDate(i.scanned_out_at)}</td>
      <td>${i.scanned_in_at ? fmtDate(i.scanned_in_at) : '<span class="muted">Chưa về</span>'}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="7" class="muted center">Chưa có thiết bị</td></tr>';
  document.getElementById('detailTotalWrap').style.display = isAdmin(profile) ? '' : 'none';
  document.getElementById('detailTotal').textContent = money(r.total_depreciation_value);
  document.getElementById('exportLink').style.display = isAdmin(profile) ? '' : 'none';
  document.getElementById('exportLink').onclick = async (e) => { e.preventDefault(); await downloadRentalXlsx(profile, r); };
  document.getElementById('detailCard').scrollIntoView({ behavior: 'smooth' });
}

document.getElementById('closeDetail').addEventListener('click', () => {
  document.getElementById('detailCard').style.display = 'none';
});

async function init() {
  profile = await requireLogin();
  if (!profile) return;
  renderNav('/lich-su.html', profile);
  await load();
}

init().catch(e => toast(e.message, 'error'));
</script>
</body>
</html>
