<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử show - QR Rental Manager</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="nav-container"></div>
<main>
  <div class="flex between">
    <h1>Lịch sử xuất kho theo show</h1>
    <a href="/xuat-kho.html" class="btn">+ Xuất kho / Quét QR</a>
  </div>

  <div class="card" id="listCard">
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Mã show</th><th>Tên show</th><th>Khách hàng</th><th>Địa điểm</th><th>Thời gian</th>
          <th class="center">Số thiết bị</th><th class="right">Tổng khấu hao</th><th>Trạng thái</th><th></th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="empty" class="empty-state" style="display:none">Chưa có show nào.</div>
  </div>

  <div class="card" id="detailCard" style="display:none">
    <div class="flex between">
      <h2 id="detailTitle"></h2>
      <div class="flex">
        <a id="exportLink" href="#" class="btn secondary">Xuất CSV</a>
        <button class="secondary" id="closeDetail">Đóng</button>
      </div>
    </div>
    <p class="muted" id="detailMeta"></p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Mã QR</th><th>Nhóm</th><th>Model</th><th>Kiểu KH</th><th class="right">Khấu hao trừ</th><th>Thời điểm quét</th></tr></thead>
        <tbody id="detailBody"></tbody>
      </table>
    </div>
    <div class="right" style="margin-top:8px"><strong>Tổng: </strong><span id="detailTotal"></span></div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
renderNav('/lich-su.html');

async function load() {
  const rentals = await api('/api/rentals');
  document.getElementById('empty').style.display = rentals.length ? 'none' : 'block';
  document.getElementById('tbody').innerHTML = rentals.map(r => `
    <tr>
      <td class="mono">${esc(r.code)}</td>
      <td>${esc(r.showName)}</td>
      <td>${esc(r.customer || '—')}</td>
      <td>${esc(r.location || '—')}</td>
      <td style="font-size:12.5px">${fmtDate(r.startDateTime)}<br>→ ${fmtDate(r.endDateTime)}</td>
      <td class="center">${r.items.length}</td>
      <td class="right">${money(r.totalDepreciationValue)}</td>
      <td><span class="badge ${r.status}">${statusLabel(r.status)}</span></td>
      <td><button class="secondary" data-view="${r.id}">Xem</button></td>
    </tr>
  `).join('');
  document.querySelectorAll('button[data-view]').forEach(btn => {
    btn.addEventListener('click', () => viewDetail(btn.dataset.view));
  });
}

function statusLabel(s) {
  return { active: 'Đang mở', closed: 'Đã đóng', returned: 'Đã trả kho' }[s] || s;
}

async function viewDetail(id) {
  const r = await api('/api/rentals/' + id);
  document.getElementById('detailCard').style.display = '';
  document.getElementById('detailTitle').textContent = r.code + ' — ' + r.showName;
  document.getElementById('detailMeta').textContent =
    `${r.customer || '—'} · ${r.location || '—'} · ${fmtDate(r.startDateTime)} → ${fmtDate(r.endDateTime)} · Trạng thái: ${statusLabel(r.status)}`;
  document.getElementById('detailBody').innerHTML = r.items.map(i => `
    <tr>
      <td class="mono">${esc(i.qrCode)}</td>
      <td>${esc(i.group)} / ${esc(i.category)}</td>
      <td>${esc(i.brand)} ${esc(i.model)}</td>
      <td>${i.depreciationType === 'show' ? 'Theo show' : 'Theo tháng'}</td>
      <td class="right">${money(i.deductionValue)}</td>
      <td>${fmtDate(i.scannedAt)}</td>
    </tr>
  `).join('') || '<tr><td colspan="6" class="muted center">Chưa có thiết bị</td></tr>';
  document.getElementById('detailTotal').textContent = money(r.totalDepreciationValue);
  document.getElementById('exportLink').href = '/api/rentals/' + r.id + '/export.csv';
  document.getElementById('detailCard').scrollIntoView({ behavior: 'smooth' });
}

document.getElementById('closeDetail').addEventListener('click', () => {
  document.getElementById('detailCard').style.display = 'none';
});

load().catch(e => toast(e.message, 'error'));
</script>
</body>
</html>
