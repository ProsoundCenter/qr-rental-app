<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký công ty mới - Rental APP</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1c6dd0">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rental APP">
<script src="/js/pwa.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="auth-bg">
<main class="narrow">
  <div class="card">
    <div class="auth-logo">
      <svg class="badge-icon" width="44" height="44" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#2563eb"/>
            <stop offset="1" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <rect width="44" height="44" rx="12" fill="url(#logoGrad2)"/>
        <g fill="none" stroke="#fff" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
          <path d="M22 9 L34 15 L34 29 L22 35 L10 29 L10 15 Z"/>
          <path d="M10 15 L22 21 L34 15"/>
          <path d="M22 21 L22 35"/>
        </g>
        <path d="M6 6 L6 11 M6 6 L11 6" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
        <path d="M38 6 L38 11 M38 6 L33 6" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
      </svg>
      <div class="word">Rental<span class="accent">APP</span></div>
    </div>
    <h1 class="center" style="margin-top:-6px">Đăng ký tài khoản công ty</h1>
    <p class="muted center" style="margin-top:-6px">Tạo công ty của bạn, sau đó chọn gói và thanh toán để kích hoạt.</p>
    <form id="form">
      <div style="margin-bottom:12px">
        <label>Tên công ty *</label>
        <input name="companyName" required>
      </div>
      <div style="margin-bottom:12px">
        <label>Số điện thoại</label>
        <input name="phone">
      </div>
      <div style="margin-bottom:12px">
        <label>Tên đăng nhập (username) *</label>
        <input name="username" required autocomplete="username" placeholder="vd: cty_abc">
      </div>
      <div style="margin-bottom:12px">
        <label>Mật khẩu *</label>
        <input type="password" name="password" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="block">Đăng ký</button>
    </form>
    <p class="center muted" style="margin-top:14px">Đã có tài khoản? <a href="/login.html">Đăng nhập</a></p>
  </div>
</main>

<script src="/js/config.js"></script>
<script src="/js/supabaseClient.js"></script>
<script src="/js/common.js"></script>
<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd.entries());
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  try {
    const res = await fetch(window.APP_CONFIG.SUPABASE_URL + '/functions/v1/signup-company', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + window.APP_CONFIG.SUPABASE_ANON_KEY
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Đăng ký thất bại');

    // Dang nhap ngay sau khi tao xong
    const { error: signInErr } = await sb.auth.signInWithPassword({
      email: usernameToEmail(body.username),
      password: body.password
    });
    if (signInErr) throw signInErr;

    toast('Đăng ký thành công!', 'success');
    setTimeout(() => location.href = '/choose-plan.html', 600);
  } catch (err) {
    toast(err.message, 'error');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
