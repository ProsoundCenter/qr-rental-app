<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhập kho - QR Rental Manager</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1c6dd0">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rental APP">
<script src="/js/pwa.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div id="nav-container"></div>
<main>
  <div class="flex between">
    <h1 id="pageTitle">Nhập kho - Tạo tài sản / thiết bị mới</h1>
    <a href="/index.html" class="btn secondary">&larr; Về danh sách</a>
  </div>

  <form id="form" class="card">
    <h2>1. Phân loại</h2>
    <div class="row">
      <div>
        <label>Nhóm sản phẩm / thiết bị *</label>
        <input name="asset_group" required placeholder="VD: Âm thanh, Ánh sáng, Sân khấu..." list="groupList" autocomplete="off">
      </div>
      <div>
        <label>Chủng loại</label>
        <input name="category" placeholder="VD: Loa, Micro, Đèn Moving head..." list="categoryList" autocomplete="off">
      </div>
      <div>
        <label>Nhãn hiệu</label>
        <input name="brand" placeholder="VD: JBL, Shure, Chauvet..." list="brandList" autocomplete="off">
      </div>
      <div>
        <label>Model *</label>
        <input name="model" required placeholder="VD: SRX835P" list="modelList" autocomplete="off">
        <div id="modelHint" class="muted" style="font-size:12.5px;margin-top:4px"></div>
      </div>
    </div>
    <datalist id="groupList"></datalist>
    <datalist id="categoryList"></datalist>
    <datalist id="brandList"></datalist>
    <datalist id="modelList"></datalist>
    <div class="row">
      <div style="grid-column: 1 / -1">
        <label>Mô tả</label>
        <textarea name="description" placeholder="Thông số, tình trạng, phụ kiện đi kèm..."></textarea>
      </div>
    </div>

    <h2>2. Ngày tháng</h2>
    <div class="row">
      <div>
        <label>Ngày sản xuất</label>
        <input type="date" name="manufacture_date">
      </div>
      <div>
        <label>Ngày nhập kho</label>
        <input type="date" name="import_date">
      </div>
    </div>

    <h2>3. Giá trị & khấu hao</h2>
    <div class="row">
      <div>
        <label>Giá trị nhập (đ) *</label>
        <input type="number" name="import_value" min="0" step="1000" required>
      </div>
      <div>
        <label>Kiểu khấu hao *</label>
        <select name="depreciation_type">
          <option value="month">Theo tháng (khấu hao theo thời gian sử dụng)</option>
          <option value="show">Theo show (khấu hao theo số lần cho thuê)</option>
        </select>
      </div>
      <div>
        <label id="periodLabel">Số tháng dự kiến khấu hao *</label>
        <input type="number" name="depreciation_period" min="1" step="1" required>
      </div>
      <div>
        <label>Đơn giá khấu hao danh định (tự tính)</label>
        <input id="unitPreview" disabled value="0 đ">
      </div>
    </div>

    <div id="editOnlyStats" class="row" style="display:none">
      <div>
        <label>Số lần đã cho thuê</label>
        <input id="rentalCountView" disabled>
      </div>
      <div>
        <label>Giá trị còn lại</label>
        <input id="remainingView" disabled>
      </div>
      <div>
        <label>Trạng thái</label>
        <select name="status">
          <option value="available">Sẵn sàng</option>
          <option value="rented">Đang cho thuê</option>
        </select>
      </div>
    </div>

    <h2>4. Mã QR / Mã thẻ RFID (có thể sửa)</h2>
    <div class="row">
      <div>
        <label>Mã ngắn dán lên QR, hoặc mã thẻ RFID (để trống sẽ tự sinh mã QR)</label>
        <div class="flex" style="gap:8px">
          <input name="qr_code" id="qrCodeInput" placeholder="VD: TS-00001" class="mono" style="flex:1">
          <button type="button" class="secondary" id="rfidScanOnceBtn" style="display:none;white-space:nowrap;padding:9px 12px">📡 Quét thẻ RFID</button>
        </div>
        <div class="muted" id="rfidOnceStatus" style="font-size:12px;margin-top:4px"></div>
      </div>
      <div>
        <label>Xem trước QR</label>
        <div class="qr-box">
          <div id="qrPreview"></div>
          <div class="mono" id="qrPreviewText" style="font-size:12px;color:var(--muted)"></div>
        </div>
      </div>
    </div>

    <div class="flex" style="margin-top: 10px">
      <button type="submit">💾 Lưu tài sản</button>
      <a id="printLink" href="#" class="btn secondary" style="display:none">🖨️ In tem QR cho thiết bị này</a>
      <button type="button" id="deleteBtn" class="danger" style="display:none">Xoá tài sản</button>
    </div>
  </form>
</main>

<script src="/js/config.js"></script>
<script src="/js/supabaseClient.js"></script>
<script src="/js/common.js"></script>
<script src="/js/data.js"></script>
<script src="/js/rfid.js"></script>
<script>
let profile = null;
const params = new URLSearchParams(location.search);
const assetId = params.get('id');
const form = document.getElementById('form');
let ALL_ASSETS = [];

function fillDatalist(id, values) {
  const uniq = [...new Set(values.map(v => (v || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'vi'));
  document.getElementById(id).innerHTML = uniq.map(v => `<option value="${esc(v)}">`).join('');
}

function updateModelList() {
  const brand = form.brand.value.trim().toLowerCase();
  const pool = brand ? ALL_ASSETS.filter(a => (a.brand || '').trim().toLowerCase() === brand) : ALL_ASSETS;
  fillDatalist('modelList', pool.map(a => a.model));
  updateModelHint();
}

function updateModelHint() {
  const brand = form.brand.value.trim().toLowerCase();
  const model = form.model.value.trim().toLowerCase();
  const hint = document.getElementById('modelHint');
  if (!model) { hint.textContent = ''; return; }
  const matches = ALL_ASSETS.filter(a =>
    (a.model || '').trim().toLowerCase() === model &&
    (!brand || (a.brand || '').trim().toLowerCase() === brand) &&
    a.id !== assetId
  );
  if (!matches.length) { hint.textContent = ''; hint.style.color = ''; return; }
  const sample = matches.slice(0, 5).map(a => a.qr_code).join(', ');
  hint.textContent = `✓ Đã có ${matches.length} thiết bị cùng model này trong kho — mã: ${sample}${matches.length > 5 ? '…' : ''}. Nếu đây là thiết bị mới cùng loại thì cứ tiếp tục lưu.`;
  hint.style.color = 'var(--primary-dark, #1e40af)';
}

async function loadSuggestions() {
  try {
    ALL_ASSETS = await listAssets();
    fillDatalist('groupList', ALL_ASSETS.map(a => a.asset_group));
    fillDatalist('categoryList', ALL_ASSETS.map(a => a.category));
    fillDatalist('brandList', ALL_ASSETS.map(a => a.brand));
    updateModelList();
  } catch (e) { /* goi y khong bat buoc, bo qua neu loi */ }
}

form.brand.addEventListener('input', updateModelList);
form.model.addEventListener('input', updateModelHint);

function updatePeriodLabel() {
  const type = form.depreciation_type.value;
  document.getElementById('periodLabel').textContent = type === 'show'
    ? 'Số show dự kiến khấu hao *'
    : 'Số tháng dự kiến khấu hao *';
  updateUnitPreview();
}

function updateUnitPreview() {
  const val = Number(form.import_value.value) || 0;
  const period = Number(form.depreciation_period.value) || 0;
  const unit = unitDepreciation(val, period);
  const type = form.depreciation_type.value === 'show' ? '/show' : '/tháng';
  document.getElementById('unitPreview').value = money(unit) + type;
}

function updateQrPreview() {
  const text = form.qr_code.value;
  const box = document.getElementById('qrPreview');
  const val = (text && text.trim()) || (assetId ? '(giữ nguyên mã hiện tại)' : '(mã sẽ tự sinh khi lưu)');
  document.getElementById('qrPreviewText').textContent = val;
  box.innerHTML = '';
  const codeForQr = (text && text.trim()) || 'PREVIEW';
  try {
    new QRCode(box, { text: codeForQr, width: 120, height: 120 });
  } catch (e) { /* library may not load offline */ }
}

form.import_value.addEventListener('input', updateUnitPreview);
form.depreciation_period.addEventListener('input', updateUnitPreview);
form.depreciation_type.addEventListener('change', updatePeriodLabel);
document.getElementById('qrCodeInput').addEventListener('input', updateQrPreview);

// Quet 1 lan de lay ma EPC cua the RFID va dien vao o ma - danh cho tai san gan the
// RFID (co san mot ma co dinh tu nha san xuat) thay vi go tay hoac de app tu sinh ma QR.
// Doc xong 1 the la tu dong dung quet + ngat ket noi (khong quet lien tuc nhu trang xuat kho).
if (typeof rfidIsSupported === 'function' && rfidIsSupported()) {
  const rfidBtn = document.getElementById('rfidScanOnceBtn');
  const rfidStatus = document.getElementById('rfidOnceStatus');
  rfidBtn.style.display = '';
  rfidBtn.addEventListener('click', async () => {
    rfidBtn.disabled = true;
    rfidStatus.textContent = 'Đang kết nối... (chọn cổng USB của đầu đọc trong hộp thoại trình duyệt)';
    let reader = null;
    try {
      reader = createNRNReader();
      await reader.connect();
      rfidStatus.textContent = 'Đã kết nối — đưa thẻ RFID lại gần đầu đọc...';
      await reader.startInventory([1], async (tag) => {
        if (!tag || !tag.epc) return;
        document.getElementById('qrCodeInput').value = tag.epc;
        updateQrPreview();
        rfidStatus.textContent = '✓ Đã lấy mã từ thẻ: ' + tag.epc;
        try { await reader.stopInventory(); await reader.disconnect(); } catch (e) {}
        rfidBtn.disabled = false;
      });
    } catch (e) {
      rfidStatus.textContent = 'Lỗi: ' + e.message;
      rfidBtn.disabled = false;
    }
  });
}

async function loadExisting() {
  if (!assetId) { updateQrPreview(); return; }
  document.getElementById('pageTitle').textContent = 'Sửa tài sản / thiết bị';
  document.getElementById('editOnlyStats').style.display = '';
  document.getElementById('deleteBtn').style.display = '';
  const a = await getAsset(assetId);
  form.asset_group.value = a.asset_group || '';
  form.category.value = a.category || '';
  form.brand.value = a.brand || '';
  form.model.value = a.model || '';
  form.description.value = a.description || '';
  form.manufacture_date.value = a.manufacture_date || '';
  form.import_date.value = a.import_date || '';
  form.import_value.value = a.import_value || 0;
  form.depreciation_type.value = a.depreciation_type || 'month';
  form.depreciation_period.value = a.depreciation_period || '';
  form.qr_code.value = a.qr_code || '';
  if (form.status) form.status.value = a.status || 'available';
  document.getElementById('rentalCountView').value = a.rental_count || 0;
  document.getElementById('remainingView').value = money(Number(a.import_value) - Number(a.total_depreciated || 0));
  document.getElementById('printLink').style.display = '';
  document.getElementById('printLink').href = '/tem.html?id=' + a.id;
  updatePeriodLabel();
  updateQrPreview();
  updateModelList();
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(form);
  const body = Object.fromEntries(fd.entries());
  try {
    let saved;
    if (assetId) {
      saved = await updateAsset(assetId, body);
      toast('Đã cập nhật tài sản', 'success');
    } else {
      saved = await createAsset(profile, body);
      toast('Đã nhập kho thành công. Mã QR: ' + saved.qr_code, 'success');
    }
    setTimeout(() => location.href = '/tem.html?id=' + saved.id, 700);
  } catch (err) {
    toast(err.message, 'error');
  }
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
  if (!confirm('Xoá tài sản này khỏi kho? Hành động không thể hoàn tác.')) return;
  await deleteAsset(assetId);
  toast('Đã xoá', 'success');
  setTimeout(() => location.href = '/index.html', 500);
});

async function init() {
  profile = await requireLogin();
  if (!profile) return;
  if (!requireAdmin(profile)) return;
  renderNav('/nhap-kho.html', profile);
  await loadSuggestions();
  await loadExisting();
}

init().catch(e => toast(e.message, 'error'));
</script>
</body>
</html>
